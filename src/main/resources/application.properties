spring.application.name=BarberRecods

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/barberdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:barber}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:}

app.working-hours.start=09:00
app.working-hours.end=20:00
app.slot-interval-minutes=30

app.backups.path=backups

server.port=8080
